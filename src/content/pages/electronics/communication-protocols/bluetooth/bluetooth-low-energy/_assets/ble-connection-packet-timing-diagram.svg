nsform="matrix(1.5625,0,0,1.5625,-975.074,-70.8661)"><text x="729.894px" y="430.866px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.333px;fill:#002388;">Anchor</text><g transform="matrix(13.3333,0,0,13.3333,765.473,444.636)"></g><text x="736.561px" y="444.636px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.333px;fill:#002388;">point</text></g><g transform="matrix(1.5625,0,0,1.5625,-194.882,-46.1419)"><text x="219.213px" y="62.464px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.333px;fill:#ea7500;">Empty packets</text><text x="219.213px" y="76.234px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.333px;fill:#ea7500;">sent back and</text><text x="219.213px" y="90.003px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.333px;fill:#ea7500;">forth just to keep</text><g transform="matrix(13.3333,0,0,13.3333,314.831,103.773)"></g><text x="219.213px" y="103.773px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.333px;fill:#ea7500;">connection alive</text></g><g transform="matrix(20.8333,0,0,20.8333,492.859,143.839)"></g><text x="330.709px" y="143.839px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:20.833px;fill:#e706c7;">Connection event</text><g transform="matrix(1.5625,0,0,1.5625,-137.928,366.142)"><text x="223.763px" y="62.464px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.333px;fill:#ea7500;">150 us</text><g transform="matrix(13.3333,0,0,13.3333,266.371,76.2337)"></g><text x="221.188px" y="76.234px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:13.333px;fill:#ea7500;">(T_IFS)</text></g><g transform="matrix(20.8333,0,0,20.8333,431.692,558.23)"></g><text x="253.347px" y="558.23px" style="font-family:'ArialMT', 'Arial', sans-serif;font-size:20.833px;fill:#ea7500;">Connection interval</text><g transform="matrix(1.5625,0,0,1.5625,708.661,-14.9231)"><text x="219.213px" y="62.464px" style="font-family:'ArialMT', 'Arial', sans-serif;