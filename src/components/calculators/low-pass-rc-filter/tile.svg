<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" stroke-linecap="round" stroke-linejoin="round">
  <!-- First-order passive low-pass RC filter: series resistor + shunt
       capacitor to ground. Input on the left, output on the right.
       The literal circuit the calculator solves. -->

  <!-- Input node (left circle) -->
  <circle cx="8" cy="30" r="3" fill="none" stroke="#6b7280" stroke-width="2"/>

  <!-- Wire from input into resistor -->
  <line x1="11" y1="30" x2="22" y2="30" stroke="#6b7280" stroke-width="2.5"/>

  <!-- Resistor (zig-zag) -->
  <polyline points="22,30 26,22 32,38 38,22 44,38 50,30 54,30"
            fill="none" stroke="#c60e00" stroke-width="3"/>

  <!-- Wire from resistor to output tap (node) -->
  <line x1="54" y1="30" x2="84" y2="30" stroke="#6b7280" stroke-width="2.5"/>

  <!-- Output node (right circle) -->
  <circle cx="86" cy="30" r="3" fill="none" stroke="#6b7280" stroke-width="2"/>

  <!-- Tap down to the capacitor -->
  <line x1="68" y1="30" x2="68" y2="50" stroke="#6b7280" stroke-width="2.5"/>

  <!-- Capacitor (two parallel plates) -->
  <line x1="58" y1="50" x2="78" y2="50" stroke="#c60e00" stroke-width="3.5"/>
  <line x1="58" y1="58" x2="78" y2="58" stroke="#c60e00" stroke-width="3.5"/>

  <!-- Wire down to ground -->
  <line x1="68" y1="58" x2="68" y2="72" stroke="#6b7280" stroke-width="2.5"/>

  <!-- Ground symbol -->
  <line x1="58" y1="72" x2="78" y2="72" stroke="#6b7280" stroke-width="3"/>
  <line x1="62" y1="77" x2="74" y2="77" stroke="#6b7280" stroke-width="2.5"/>
  <line x1="65" y1="82" x2="71" y2="82" stroke="#6b7280" stroke-width="2"/>

  <!-- f_c label -->
  <text x="48" y="94" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" font-weight="700" fill="#c60e00">f_c = 1/2πRC</text>
</svg>
