<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" stroke-linecap="round" stroke-linejoin="round">
  <!-- 555 timer IC body with a square-wave output to its right. Reads as
       "the 555 generates a periodic pulse train" — the literal thing the
       astable calculator designs. -->

  <!-- IC body -->
  <rect x="10" y="20" width="42" height="38" fill="#1f2937" stroke="#6b7280" stroke-width="2" rx="2"/>

  <!-- IC pin stubs (just the visual hint of pins on each side) -->
  <g stroke="#6b7280" stroke-width="2">
    <line x1="6" y1="28" x2="10" y2="28"/>
    <line x1="6" y1="36" x2="10" y2="36"/>
    <line x1="6" y1="44" x2="10" y2="44"/>
    <line x1="6" y1="52" x2="10" y2="52"/>
    <line x1="52" y1="28" x2="56" y2="28"/>
    <line x1="52" y1="36" x2="56" y2="36"/>
    <line x1="52" y1="44" x2="56" y2="44"/>
    <line x1="52" y1="52" x2="56" y2="52"/>
  </g>

  <!-- "555" label -->
  <text x="31" y="44" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="14" font-weight="700" fill="#c60e00">555</text>

  <!-- Square wave output to the right -->
  <polyline points="56,52 60,52 60,30 70,30 70,52 80,52 80,30 90,30"
            fill="none" stroke="#c60e00" stroke-width="3"/>

  <!-- t_H / t_L annotation arrows -->
  <text x="48" y="80" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" font-weight="700" fill="#c60e00">astable</text>
  <text x="48" y="92" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" fill="#6b7280">R₁ R₂ C → f, D</text>
</svg>
