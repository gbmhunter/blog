<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- Sine wave (small / quiet) -->
  <path d="M 8 64 Q 16 60 24 64 Q 32 68 40 64" stroke="#6b7280" stroke-width="3" fill="none"/>
  <!-- Larger sine wave (amplified) -->
  <path d="M 48 64 Q 56 40 64 64 Q 72 88 80 64 Q 86 50 90 64" stroke="#c60e00" stroke-width="4" fill="none"/>
  <!-- Arrow between -->
  <line x1="42" y1="64" x2="50" y2="64" stroke="#c60e00" stroke-width="3"/>
  <polyline points="48,60 52,64 48,68" stroke="#c60e00" stroke-width="3" fill="none"/>
  <!-- dB label top -->
  <text x="48" y="22" text-anchor="middle" font-family="ui-monospace, monospace" font-size="16" font-weight="700" fill="#c60e00" stroke="none">dBm</text>
  <!-- Lower label -->
  <text x="48" y="36" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#6b7280" stroke="none">⇌ W ⇌ dBW</text>
</svg>
